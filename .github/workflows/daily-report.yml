name: Daily Report (Gemini AI 日報)

# 每天 09:00 UTC = 17:00 Asia/Taipei
# 讀 daily.json 昨日資料 → 餵 Gemini 寫摘要 → 產 reports/YYYY-MM-DD.html
#
# 必要 GitHub Secret：
#   GEMINI_API_KEY  (到 https://aistudio.google.com/apikey 取免費 key)
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: node scripts/daily-report.mjs

      - name: Commit & push
        run: |
          # daily-report.mjs 在「昨日沒有監控資料」時會 exit 0 但不建立 reports/
          # 那不是錯誤，是合法跳過 — 不要被後面 git add 當成失敗
          if [ ! -d reports ]; then
            echo "reports/ 不存在（daily-report.mjs 跳過產出），無事可 commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git fetch origin main
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
              git reset --soft origin/main
            fi

            git add reports/

            if git diff --cached --quiet; then
              echo "No new report to commit"
              exit 0
            fi

            git commit -m "report: $(date -u '+%Y-%m-%d') daily summary [skip ci]"

            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi

            sleep $((i * 3))
          done

          echo "Push failed after 3 attempts"
          exit 1
