name: External Probe (外部視角)

# 從 GitHub Actions ubuntu runner 探測公開目標
# 與校內 Windows 採集點交叉比對，分辨「校內出口問題」vs「服務本身掛了」
on:
  schedule:
    - cron: '*/15 * * * *'   # 每 15 分鐘
  workflow_dispatch:          # 也允許手動觸發

permissions:
  contents: write

concurrency:
  group: external-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run external probe
        run: node scripts/external-probe.mjs

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # external-status.json 是每跑一次重新生成的檔案，不需要 merge 邏輯。
          # 若有衝突，永遠以這次跑的結果為準。
          # 做法：每次重試都 fetch 最新 origin，soft-reset 過去，重新 commit 一筆乾淨的，再 push。
          for i in 1 2 3; do
            git fetch origin main

            # 如果 HEAD 已偏離 origin/main（先前迭代的失敗 commit），soft reset 回去保留檔案變更
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
              git reset --soft origin/main
            fi

            git add external-status.json

            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "external: $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"

            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi

            echo "Push failed on attempt $i, retrying..."
            sleep $((i * 3))
          done

          echo "Push failed after 3 attempts"
          exit 1
