<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>石門國小網路狀態儀表板</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏠%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* ===== Theme variables ===== */
  :root {
    --bg: #f7f1e8;
    --bg-soft: #efe6d3;
    --card: #fffdf8;
    --card-border: #ece2cf;
    --ink: #4a3f2f;
    --ink-soft: #8a7c66;
    --ink-faint: #b6aa95;
    --shadow: 0 2px 6px rgba(150, 120, 80, 0.08), 0 8px 24px rgba(150, 120, 80, 0.06);
    --green: #5cb85c;
    --green-soft: #e8f5e9;
    --yellow: #f0ad4e;
    --yellow-soft: #fff4e0;
    --red: #d9534f;
    --red-soft: #fdecea;
    --link: #c97a3e;
    --row-alt: #fbf6ec;
    --chip: #ece4d3;
  }
  [data-theme="dark"] {
    --bg: #15110d;
    --bg-soft: #1d1813;
    --card: #221c15;
    --card-border: #3a322a;
    --ink: #f0e6d2;
    --ink-soft: #a39684;
    --ink-faint: #6e6557;
    --shadow: 0 2px 8px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.25);
    --green: #66c266;
    --green-soft: #1f3a25;
    --yellow: #f5b95c;
    --yellow-soft: #3a2d18;
    --red: #e26b67;
    --red-soft: #3a1f1d;
    --link: #e9a060;
    --row-alt: #1c1711;
    --chip: #2e2620;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: "Segoe UI", "Microsoft JhengHei", "PingFang TC", -apple-system, sans-serif;
    color: var(--ink);
    line-height: 1.55;
    transition: background-color 0.25s ease, color 0.25s ease;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 20px 64px;
  }

  /* ===== Header ===== */
  header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px dashed var(--card-border);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 28px;
    margin: 0;
    letter-spacing: 1px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
  }
  .icon-btn {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.1s ease, background-color 0.2s ease;
    box-shadow: var(--shadow);
  }
  .icon-btn:hover { transform: translateY(-1px); }
  .icon-btn:active { transform: translateY(0); }

  .badge-bar {
    text-align: center;
    margin: 12px 0 6px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 15px;
    background: var(--green-soft);
    color: var(--green);
    border: 1px solid var(--green);
    transition: all 0.25s ease;
  }
  .badge.warn { background: var(--yellow-soft); color: var(--yellow); border-color: var(--yellow); }
  .badge.alert { background: var(--red-soft); color: var(--red); border-color: var(--red); animation: pulse 2s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217,83,79,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(217,83,79,0); }
  }
  .subtitle {
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .meta {
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .meta strong { color: var(--ink); }

  /* ===== Status cards ===== */
  section.group { margin-bottom: 26px; }
  section.group h2 {
    font-size: 16px;
    margin: 0 0 12px 4px;
    color: var(--ink);
    font-weight: 600;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 16px 18px;
    text-align: center;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.10), 0 12px 28px rgba(0,0,0,0.08);
  }
  .card .name { font-weight: 600; font-size: 15px; color: var(--ink); }
  .card .host {
    font-size: 11.5px;
    color: var(--ink-soft);
    font-family: "Consolas", "Menlo", monospace;
    word-break: break-all;
  }
  .ball {
    width: 46px; height: 46px;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.55), 0 4px 10px rgba(0,0,0,0.12);
    background: radial-gradient(circle at 30% 25%, #fff8 0%, transparent 45%), var(--ink-faint);
    margin: 4px 0;
  }
  [data-theme="dark"] .ball {
    box-shadow: 0 0 0 3px rgba(255,255,255,0.08), 0 4px 10px rgba(0,0,0,0.4);
  }
  .ball.green   { background: radial-gradient(circle at 30% 25%, #fff8 0%, transparent 45%), var(--green); }
  .ball.yellow  { background: radial-gradient(circle at 30% 25%, #fff8 0%, transparent 45%), var(--yellow); }
  .ball.red     { background: radial-gradient(circle at 30% 25%, #fff8 0%, transparent 45%), var(--red); }
  .latency { font-size: 13px; color: var(--ink-soft); }
  .latency strong { color: var(--ink); font-size: 15px; }
  .sla {
    font-size: 12px;
    color: var(--ink-soft);
    background: var(--bg-soft);
    padding: 3px 10px;
    border-radius: 999px;
    margin-top: 4px;
  }

  /* ===== Charts ===== */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 16px 14px;
    box-shadow: var(--shadow);
    margin-top: 24px;
  }
  .chart-card h2 {
    font-size: 16px;
    margin: 0 0 12px 4px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--bg-soft);
    color: var(--ink-soft);
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s ease;
  }
  .tab:hover { background: var(--chip); }
  .tab.active {
    background: var(--card);
    color: var(--ink);
    border-color: var(--card-border);
    font-weight: 600;
  }
  .chart-wrap {
    position: relative;
    height: 320px;
  }

  /* ===== External view ===== */
  .external-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px 16px 14px;
    box-shadow: var(--shadow);
    margin-top: 24px;
  }
  .external-card h2 { font-size: 15px; margin: 0 0 4px 4px; }
  .external-card .ext-meta { font-size: 12px; color: var(--ink-soft); margin: 0 4px 12px; }
  .ext-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .ext-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: var(--bg-soft);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--ink);
  }
  .ext-pill .mini-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--ink-faint);
  }
  .ext-pill .mini-dot.green  { background: var(--green); }
  .ext-pill .mini-dot.yellow { background: var(--yellow); }
  .ext-pill .mini-dot.red    { background: var(--red); }
  .ext-pill .ext-ms { color: var(--ink-soft); font-size: 11.5px; }
  .ext-conflict {
    display: inline-block;
    background: var(--yellow-soft);
    color: var(--yellow);
    border: 1px solid var(--yellow);
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    margin-left: 8px;
  }

  /* ===== History table ===== */
  .history-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 16px;
    box-shadow: var(--shadow);
    margin-top: 24px;
    overflow-x: auto;
  }
  .history-card h2 { font-size: 16px; margin: 0 0 14px 4px; }
  table.history {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 700px;
  }
  table.history th {
    text-align: left;
    padding: 10px 12px;
    color: var(--ink-soft);
    font-weight: 600;
    border-bottom: 1px solid var(--card-border);
    white-space: nowrap;
  }
  table.history td {
    padding: 10px 12px;
    border-bottom: 1px dashed var(--card-border);
    white-space: nowrap;
  }
  table.history tr:nth-child(even) td { background: var(--row-alt); }
  .time-chip {
    display: inline-block;
    padding: 4px 10px;
    background: var(--chip);
    border-radius: 6px;
    font-family: "Consolas", "Menlo", monospace;
    font-size: 12px;
    color: var(--ink);
  }
  .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    background: var(--ink-faint);
  }
  .dot.green  { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red    { background: var(--red); }
  .ms-na { color: var(--red); font-weight: 600; }

  /* ===== Footer ===== */
  footer {
    margin-top: 40px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding-top: 18px;
    border-top: 2px dashed var(--card-border);
  }
  footer a {
    color: var(--link);
    text-decoration: none;
    font-weight: 600;
  }
  footer a:hover { text-decoration: underline; }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
    background: var(--card);
    border-radius: 14px;
    border: 1px dashed var(--card-border);
  }
  @media (max-width: 600px) {
    header h1 { font-size: 22px; }
    .cards { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .ball { width: 38px; height: 38px; }
    .chart-wrap { height: 260px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <h1 id="pageTitle">🏠 石門國小網路狀態儀表板</h1>
      <div class="header-actions">
        <button class="icon-btn" id="refreshBtn" title="立即重整">🔄</button>
        <button class="icon-btn" id="themeBtn" title="切換明暗模式">🌙</button>
      </div>
    </div>
    <div class="badge-bar"><span class="badge" id="statusBadge">⏳ 載入中…</span></div>
    <div class="subtitle" id="pageSubtitle">校園網路即時監控（每 5 分鐘自動更新）</div>
    <div class="meta">最後更新：<strong id="lastUpdate">—</strong></div>
  </header>

  <main id="main">
    <div class="empty" id="emptyMsg">⏳ 載入中…</div>
  </main>

  <footer>
    <a href="reports/" rel="noopener">📋 查看每日日報</a>
    　·
    Made with ❤️ by
    <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&amp;nsn=16#a5" target="_blank" rel="noopener noreferrer">阿凱老師</a>
    　·
    資料來源：<a href="https://github.com/cagoooo/ipconfig" target="_blank" rel="noopener">github.com/cagoooo/ipconfig</a>
  </footer>
</div>

<script>
  /* ===== Constants & state（必須先宣告，applyTheme 會用到 charts）===== */
  const THEME_KEY = 'ipconfig.theme';
  const REFRESH_MS = 60 * 1000;
  const COLOR_PALETTE = ['#5cb85c', '#5bc0de', '#f0ad4e', '#9b59b6', '#1abc9c', '#e67e22', '#3498db', '#e74c3c', '#2ecc71', '#16a085', '#d35400'];
  let thresholds = { greenMaxMs: 100, yellowMaxMs: 300, yellowMaxLossPercent: 30 };
  const charts = {}; // groupName -> Chart instance
  let activeGroupTab = null;

  /* ===== Theme ===== */
  const themeBtn = document.getElementById('themeBtn');
  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, t);
    if (Object.keys(charts).length > 0) {
      Object.values(charts).forEach(c => updateChartTheme(c));
    }
  }
  (function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    applyTheme(saved || sys);
  })();
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
  });

  /* ===== Helpers ===== */
  function classify(entry) {
    if (!entry || !entry.ok) return 'red';
    const ms = entry.avgMs;
    const loss = entry.lossPercent || 0;
    if (loss >= 50) return 'red';
    if (ms === null || ms === undefined) return 'red';
    if (ms <= thresholds.greenMaxMs && loss === 0) return 'green';
    if (ms <= thresholds.yellowMaxMs && loss <= thresholds.yellowMaxLossPercent) return 'yellow';
    return 'red';
  }
  function fmtMs(ms) {
    if (ms === null || ms === undefined) return '—';
    return ms.toFixed(ms < 10 ? 2 : 1) + 'ms';
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  async function fetchJson(path) {
    const url = path + '?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(path + ' ' + r.status);
    return r.json();
  }
  function getCssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  /* ===== Anomaly badge ===== */
  function updateBadge(snapshot) {
    const badge = document.getElementById('statusBadge');
    if (!snapshot || !snapshot.results) {
      badge.textContent = '⏳ 載入中…';
      badge.className = 'badge';
      return;
    }
    const total = snapshot.results.length;
    const red = snapshot.results.filter(r => classify(r) === 'red').length;
    const yellow = snapshot.results.filter(r => classify(r) === 'yellow').length;
    const baseTitle = document.getElementById('pageTitle').textContent.replace(/^\(\d+\)\s*/, '');
    if (red > 0) {
      badge.textContent = `🚨 有 ${red} 個目標異常 · ${yellow > 0 ? yellow + ' 個變慢 · ' : ''}全部 ${total} 項`;
      badge.className = 'badge alert';
      document.title = `(${red}) 石門國小網路狀態儀表板`;
    } else if (yellow > 0) {
      badge.textContent = `⚠ ${yellow} 個變慢 · ${total - yellow} 個正常`;
      badge.className = 'badge warn';
      document.title = `(${yellow}⚠) 石門國小網路狀態儀表板`;
    } else {
      badge.textContent = `✅ 全部 ${total} 項正常`;
      badge.className = 'badge';
      document.title = '石門國小網路狀態儀表板';
    }
  }

  /* ===== Status cards ===== */
  function renderStatus(snapshot) {
    const main = document.getElementById('main');
    main.innerHTML = '';
    if (!snapshot || !snapshot.results || snapshot.results.length === 0) {
      main.innerHTML = '<div class="empty">尚無檢測資料</div>';
      return;
    }

    document.getElementById('lastUpdate').textContent = snapshot.timestamp || '—';

    // 分組
    const groupsMap = new Map();
    snapshot.results.forEach(r => {
      const key = r.groupName || 'default';
      if (!groupsMap.has(key)) groupsMap.set(key, { label: r.groupLabel || key, items: [] });
      groupsMap.get(key).items.push(r);
    });

    groupsMap.forEach((group) => {
      const section = document.createElement('section');
      section.className = 'group';
      const h = document.createElement('h2');
      h.textContent = group.label;
      section.appendChild(h);

      const grid = document.createElement('div');
      grid.className = 'cards';
      group.items.forEach(item => {
        const cls = classify(item);
        const card = document.createElement('div');
        card.className = 'card';
        const slaHtml = (item.sla7d && item.sla7d.uptimePercent !== null && item.sla7d.uptimePercent !== undefined)
          ? `<span class="sla">7日可用率 <strong>${item.sla7d.uptimePercent.toFixed(2)}%</strong></span>`
          : '';
        card.innerHTML = `
          <div class="name">${escapeHtml(item.name)}</div>
          <div class="host">${escapeHtml(item.host)}</div>
          <span class="ball ${cls}"></span>
          <div class="latency">
            ${item.ok
              ? `延遲 <strong>${fmtMs(item.avgMs)}</strong>`
              : `<span class="ms-na">⚠ 無回應</span>`}
            ${item.lossPercent > 0 && item.lossPercent < 100 ? ` · 丟包 ${item.lossPercent}%` : ''}
          </div>
          ${slaHtml}
        `;
        grid.appendChild(card);
      });
      section.appendChild(grid);
      main.appendChild(section);
    });
  }

  /* ===== Charts ===== */
  function updateChartTheme(chart) {
    const ink = getCssVar('--ink');
    const inkSoft = getCssVar('--ink-soft');
    const border = getCssVar('--card-border');
    chart.options.scales.x.ticks.color = inkSoft;
    chart.options.scales.y.ticks.color = inkSoft;
    chart.options.scales.x.grid.color = border;
    chart.options.scales.y.grid.color = border;
    chart.options.scales.y.title.color = ink;
    chart.options.plugins.legend.labels.color = ink;
    chart.update('none');
  }

  function renderCharts(history, snapshot) {
    if (!history || history.length === 0) return;

    // 從最新 snapshot 拿到所有群組與其目標
    const groupsMap = new Map();
    snapshot.results.forEach(r => {
      const key = r.groupName;
      if (!groupsMap.has(key)) groupsMap.set(key, { label: r.groupLabel, targetNames: [] });
      groupsMap.get(key).targetNames.push(r.name);
    });

    const container = document.createElement('div');
    container.className = 'chart-card';
    const h = document.createElement('h2');
    h.textContent = `📈 延遲趨勢圖（最近 ${Math.min(history.length, 288)} 筆，${Math.round(history.length * 5 / 60 * 10) / 10} 小時）`;
    container.appendChild(h);

    // 分組 tabs
    const tabsBar = document.createElement('div');
    tabsBar.className = 'tabs';
    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';
    const canvas = document.createElement('canvas');
    canvas.id = 'mainChart';
    wrap.appendChild(canvas);

    container.appendChild(tabsBar);
    container.appendChild(wrap);
    document.getElementById('main').appendChild(container);

    // 預設選第一個群組或保留上次選擇
    if (!activeGroupTab || !groupsMap.has(activeGroupTab)) {
      activeGroupTab = groupsMap.keys().next().value;
    }

    function renderActiveChart() {
      const group = groupsMap.get(activeGroupTab);
      if (!group) return;

      // 反轉 history（最舊 → 最新）方便 X 軸
      const reversed = history.slice().reverse();
      const labels = reversed.map(snap => snap.timeLabel || (snap.timestamp || '').slice(11, 19));
      const datasets = group.targetNames.map((targetName, idx) => {
        const color = COLOR_PALETTE[idx % COLOR_PALETTE.length];
        const data = reversed.map(snap => {
          const r = (snap.results || []).find(x => x.groupName === activeGroupTab && x.name === targetName);
          return (r && r.ok) ? r.avgMs : null;
        });
        return {
          label: targetName,
          data,
          borderColor: color,
          backgroundColor: color + '20',
          tension: 0.25,
          spanGaps: false,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 2,
        };
      });

      // 銷毀舊圖
      if (charts.main) { charts.main.destroy(); }
      const ctx = canvas.getContext('2d');
      charts.main = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { color: getCssVar('--ink'), font: { size: 12 } } },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y === null ? '無回應' : ctx.parsed.y.toFixed(1) + ' ms'}`
              }
            }
          },
          scales: {
            x: {
              ticks: { color: getCssVar('--ink-soft'), maxRotation: 0, autoSkipPadding: 16 },
              grid: { color: getCssVar('--card-border') }
            },
            y: {
              beginAtZero: true,
              title: { display: true, text: '延遲 (ms)', color: getCssVar('--ink') },
              ticks: { color: getCssVar('--ink-soft') },
              grid: { color: getCssVar('--card-border') }
            }
          }
        }
      });
    }

    // 建立 tab 按鈕
    groupsMap.forEach((group, name) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (name === activeGroupTab ? ' active' : '');
      btn.textContent = group.label;
      btn.addEventListener('click', () => {
        activeGroupTab = name;
        tabsBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderActiveChart();
      });
      tabsBar.appendChild(btn);
    });

    renderActiveChart();
  }

  /* ===== External view ===== */
  function renderExternalView(externalSnap, internalSnap) {
    if (!externalSnap || !externalSnap.results) return;

    // 找出與校內視角的衝突（校內紅 vs 外部綠 → 校內出口問題；校內綠 vs 外部紅 → 比較少見但可能服務端問題或 GitHub runner 限制）
    const internalMap = new Map();
    if (internalSnap && internalSnap.results) {
      internalSnap.results.forEach(r => {
        internalMap.set(r.groupName + '::' + r.name, r);
      });
    }

    const card = document.createElement('div');
    card.className = 'external-card';
    const h = document.createElement('h2');
    h.textContent = '🌐 外部視角驗證';
    card.appendChild(h);

    const meta = document.createElement('div');
    meta.className = 'ext-meta';
    const reds = externalSnap.results.filter(r => classify(r) === 'red').length;
    let conflictCount = 0;
    externalSnap.results.forEach(r => {
      const key = r.groupName + '::' + r.name;
      const inside = internalMap.get(key);
      if (inside && inside.ok && !r.ok) conflictCount++;
      if (inside && !inside.ok && r.ok) conflictCount++;
    });
    meta.innerHTML = `GitHub Actions runner（美國/全球節點）· 最後更新 ${escapeHtml(externalSnap.timeLabel || '—')} · 共 ${externalSnap.results.length} 項${reds > 0 ? `，${reds} 異常` : '，全部正常'}` +
      (conflictCount > 0 ? `<span class="ext-conflict">⚠ 與校內視角有 ${conflictCount} 處不一致</span>` : '');
    card.appendChild(meta);

    const list = document.createElement('div');
    list.className = 'ext-list';
    externalSnap.results.forEach(r => {
      const cls = classify(r);
      const pill = document.createElement('span');
      pill.className = 'ext-pill';

      const key = r.groupName + '::' + r.name;
      const inside = internalMap.get(key);
      let conflictMark = '';
      if (inside && inside.ok && !r.ok) conflictMark = ' ⚠';
      else if (inside && !inside.ok && r.ok) conflictMark = ' ⚠';

      pill.innerHTML = `<span class="mini-dot ${cls}"></span>${escapeHtml(r.name)}<span class="ext-ms">${r.ok ? fmtMs(r.avgMs) : '無回應'}${conflictMark}</span>`;
      list.appendChild(pill);
    });
    card.appendChild(list);
    document.getElementById('main').appendChild(card);
  }

  /* ===== History table ===== */
  function renderHistory(history, snapshot) {
    if (!history || history.length === 0) return;
    const cols = snapshot.results.map(r => ({ groupName: r.groupName, name: r.name }));
    const container = document.createElement('div');
    container.className = 'history-card';
    const h = document.createElement('h2');
    h.textContent = '📊 最近 10 次檢測詳細數據（延遲 ms）';
    container.appendChild(h);

    const table = document.createElement('table');
    table.className = 'history';
    const thead = document.createElement('thead');
    const trh = document.createElement('tr');
    trh.innerHTML = '<th>檢測時間</th>' + cols.map(c => `<th>${escapeHtml(c.name)}</th>`).join('');
    thead.appendChild(trh);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    history.slice(0, 10).forEach(snap => {
      const tr = document.createElement('tr');
      const time = (snap.timeLabel || (snap.timestamp || '').slice(11, 19)) || '—';
      let html = `<td><span class="time-chip">${escapeHtml(time)}</span></td>`;
      cols.forEach(col => {
        const r = (snap.results || []).find(x => x.groupName === col.groupName && x.name === col.name);
        if (!r) html += '<td>—</td>';
        else {
          const cls = classify(r);
          const text = r.ok ? fmtMs(r.avgMs) : '無回應';
          html += `<td><span class="dot ${cls}"></span>${escapeHtml(text)}</td>`;
        }
      });
      tr.innerHTML = html;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
    document.getElementById('main').appendChild(container);
  }

  /* ===== Main load ===== */
  async function load() {
    try {
      const [config, status, history, external] = await Promise.allSettled([
        fetchJson('targets.json'),
        fetchJson('status.json'),
        fetchJson('history.json'),
        fetchJson('external-status.json')
      ]);

      if (config.status === 'fulfilled') {
        const c = config.value;
        if (c.title) {
          document.getElementById('pageTitle').textContent = '🏠 ' + c.title;
        }
        if (c.subtitle) document.getElementById('pageSubtitle').textContent = c.subtitle;
        if (c.thresholds) thresholds = Object.assign(thresholds, c.thresholds);
      }

      if (status.status !== 'fulfilled') {
        document.getElementById('main').innerHTML =
          '<div class="empty">⚠ 尚未產生 status.json，請等待第一次檢測完成</div>';
        document.getElementById('statusBadge').textContent = '尚無資料';
        return;
      }

      updateBadge(status.value);
      renderStatus(status.value);
      if (history.status === 'fulfilled' && history.value.length > 1) {
        renderCharts(history.value, status.value);
      }
      if (external.status === 'fulfilled') {
        renderExternalView(external.value, status.value);
      }
      if (history.status === 'fulfilled') {
        renderHistory(history.value, status.value);
      }
    } catch (err) {
      console.error(err);
      document.getElementById('main').innerHTML =
        '<div class="empty">⚠ 載入失敗：' + escapeHtml(err.message) + '</div>';
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', () => {
    document.getElementById('refreshBtn').textContent = '⏳';
    load().finally(() => {
      setTimeout(() => { document.getElementById('refreshBtn').textContent = '🔄'; }, 600);
    });
  });

  load();
  setInterval(load, REFRESH_MS);
</script>
</body>
</html>
